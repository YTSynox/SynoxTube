<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynoxTube</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- ÜST NAVİGASYON -->
    <header class="header">
        <div class="header-left">
            <i class="fas fa-bars menu-btn"></i>
            <div class="logo">
                <i class="fab fa-youtube" style="color: #0055ff;"></i>
                <span>SynoxTube</span>
            </div>
        </div>
        
        <div class="header-center">
            <div class="search-container">
                <input type="text" placeholder="Ara">
                <button><i class="fas fa-search"></i></button>
            </div>
            <div class="mic-btn"><i class="fas fa-microphone"></i></div>
        </div>

        <div class="header-right">
            <i class="fas fa-video" title="Oluştur" id="uploadTrigger"></i>
            <i class="fas fa-bell"></i>
            <div class="user-profile"></div>
        </div>
    </header>

    <div class="container">
        <!-- SOL MENÜ (SIDEBAR) -->
        <aside class="sidebar">
            <div class="nav-link active"><i class="fas fa-home"></i> <span>Ana Sayfa</span></div>
            <div class="nav-link"><i class="fab fa-youtube"></i> <span>Shorts</span></div>
            <div class="nav-link"><i class="fas fa-layer-group"></i> <span>Abonelikler</span></div>
            <hr>
            <div class="sidebar-label">Siz ></div>
            <div class="nav-link"><i class="fas fa-id-badge"></i> <span>Kanalınız</span></div>
            <div class="nav-link"><i class="fas fa-history"></i> <span>Geçmiş</span></div>
            <div class="nav-link"><i class="fas fa-play-circle"></i> <span>Videolarınız</span></div>
            <div class="nav-link"><i class="fas fa-clock"></i> <span>Daha sonra izle</span></div>
        </aside>

        <!-- ANA İÇERİK -->
        <main class="main-content">
            <!-- KATEGORİ ETİKETLERİ -->
            <div class="tags-bar">
                <div class="tag active">Tümü</div>
                <div class="tag">Oyun</div>
                <div class="tag">Müzik</div>
                <div class="tag">Canlı</div>
                <div class="tag">Mix'ler</div>
                <div class="tag">Haberler</div>
                <div class="tag">Yazılım</div>
                <div class="tag">Matematik</div>
            </div>

            <!-- VİDEO IZGARASI -->
            <div class="video-grid" id="mainGrid">
                <!-- Örnek Video (image_8570ff.jpg'deki gibi) -->
                <div class="video-item">
                    <div class="thumbnail-box">
                        <img src="https://picsum.photos/seed/yt1/320/180" alt="Thumbnail">
                        <span class="video-time">10:45</span>
                    </div>
                    <div class="video-data">
                        <div class="chan-img"></div>
                        <div class="chan-text">
                            <h3>SynoxTube Arayüz Tasarımı Yayında!</h3>
                            <p>Synox Design</p>
                            <p>120 B görüntüleme • 2 saat önce</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- DOSYA SEÇİCİLER (Gizli) -->
    <input type="file" id="vFile" accept="video/*" style="display:none">
    <input type="file" id="iFile" accept="image/*" style="display:none">

    <script src="script.js"></script>
</body>
</html>
