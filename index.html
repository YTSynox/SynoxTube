<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SynoxTube - Video Yükle ve İzle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="left">
            <i class="fas fa-bars"></i>
            <div class="logo"><i class="fab fa-youtube" style="color: #0055ff;"></i> SynoxTube</div>
        </div>
        <div class="center">
            <div class="search-box">
                <input type="text" placeholder="Ara">
                <button><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div class="right">
            <!-- VİDEO YÜKLEME BUTONU -->
            <button id="uploadBtn" class="upload-btn"><i class="fas fa-video"></i> Oluştur</button>
            <i class="fas fa-bell"></i>
            <div class="user-pic"></div>
        </div>
    </header>

    <div class="main-body">
        <aside class="sidebar">
            <div class="side-item active"><i class="fas fa-home"></i> <span>Ana Sayfa</span></div>
            <div class="side-item"><i class="fab fa-youtube"></i> <span>Shorts</span></div>
            <hr>
            <div class="section-title">Kitaplık</div>
            <div class="side-item"><i class="fas fa-history"></i> <span>Geçmiş</span></div>
        </aside>

        <main class="content">
            <div class="chips-wrapper">
                <div class="chip active">Tümü</div>
                <div class="chip">Yüklediklerim</div>
            </div>
            <!-- VİDEOLARIN SIRALANACAĞI ALAN -->
            <div class="video-grid" id="videoGrid"></div>
        </main>
    </div>

    <!-- VİDEO İZLEME PANELİ (MODAL) -->
    <div id="videoPlayerModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="player-container">
                <video id="mainVideo" controls autoplay></video>
                <h2 id="videoTitle">Video Başlığı</h2>
                <div class="video-stats">123.456 izlenme • Şimdi yüklendi</div>
                <hr>
                <div class="comments-section">
                    <h3>Yorumlar</h3>
                    <div class="add-comment">
                        <div class="user-pic"></div>
                        <input type="text" placeholder="Yorum ekleyin...">
                    </div>
                    <div class="comment">
                        <div class="user-pic"></div>
                        <div>
                            <strong>Kullanıcı 1</strong>
                            <p>Harika bir video olmuş, ellerine sağlık!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- DOSYA SEÇME GİRDİLERİ (GİZLİ) -->
    <input type="file" id="videoInput" accept="video/*" style="display:none">
    <input type="file" id="imageInput" accept="image/*" style="display:none">

    <script src="script.js"></script>
</body>
</html>
