<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynoxTube</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="logo-section">
            <i class="fas fa-bars menu-icon"></i>
            <!-- Logo kısmını yazı olarak güncelledik -->
            <h2 class="brand-logo">Synox<span>Tube</span></h2>
        </div>
        
        <div class="search-section">
            <form action="">
                <input type="text" placeholder="Ara">
                <button><i class="fas fa-search"></i></button>
            </form>
            <i class="fas fa-microphone mic-icon"></i>
        </div>

        <div class="icons-section">
            <i class="fas fa-video"></i>
            <i class="fas fa-bell"></i>
            <div class="user-avatar"></div>
        </div>
    </header>

    <main class="container">
        <aside class="sidebar">
            <div class="nav-item active"><i class="fas fa-home"></i> <span>Ana Sayfa</span></div>
            <div class="nav-item"><i class="fab fa-youtube"></i> <span>Shorts</span></div>
            <div class="nav-item"><i class="fas fa-subscriptions"></i> <span>Abonelikler</span></div>
            <hr>
            <div class="nav-item"><i class="fas fa-history"></i> <span>Geçmiş</span></div>
            <div class="nav-item"><i class="fas fa-clock"></i> <span>Daha sonra izle</span></div>
        </aside>

        <section class="video-grid">
            <div class="video-card">
                <div class="thumbnail">
                    <img src="https://via.placeholder.com/320x180/0055ff/ffffff?text=SynoxTube+Video" alt="Thumbnail">
                </div>
                <div class="video-info">
                    <div class="author-img"></div>
                    <div class="title-data">
                        <h3>SynoxTube ile Geleceğin Web Tasarımı</h3>
                        <p class="author">Synox Tasarım</p>
                        <p class="stats">500 B İzlenme • 1 saat önce</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
